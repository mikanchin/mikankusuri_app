<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>みかん薬 - お薬期限計算</title>
    <!-- iOS PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="みかん薬">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-logo">
                <svg class="logo-img" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="45" fill="var(--primary-light)"/>
                    <!-- 耳（立っている） -->
                    <polygon points="35,35 48,15 52,38" fill="#8B5A2B"/>
                    <polygon points="38,33 46,18 49,35" fill="#D2B48C"/>
                    <polygon points="50,38 63,18 67,40" fill="#8B5A2B"/>
                    <polygon points="53,36 61,21 64,38" fill="#D2B48C"/>
                    <!-- 頭部 -->
                    <circle cx="50" cy="48" r="18" fill="#D2B48C"/>
                    <!-- マズル（短い口元、横顔） -->
                    <ellipse cx="62" cy="54" r="10" rx="10" ry="7" fill="#EEDC82" transform="rotate(-5, 62, 54)"/>
                    <circle cx="68" cy="52" r="3" fill="#12100E"/> <!-- 鼻 -->
                    <!-- 目 -->
                    <circle cx="52" cy="45" r="2.5" fill="#12100E"/>
                    <circle cx="53" cy="44.2" r="0.8" fill="#FFFFFF"/> <!-- ハイライト -->
                    <!-- 体（横向き、少し見える首元と背中） -->
                    <path d="M36,75 Q40,55 48,55 L58,58 Q66,58 70,75 Z" fill="#4A4A4A"/> <!-- グレーの背中・首 -->
                    <!-- 首輪（みかん色） -->
                    <path d="M40,65 Q50,62 58,66" stroke="var(--primary)" stroke-width="3" fill="none" stroke-linecap="round"/>
                </svg>
                <h1>みかん薬</h1>
            </div>
            <div class="header-actions">
                <button id="theme-toggle" class="icon-btn" aria-label="テーマ切り替え">
                    <i data-lucide="sun" class="sun-icon"></i>
                    <i data-lucide="moon" class="moon-icon"></i>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="app-main">
            <!-- Summary Info / Header -->
            <div class="welcome-card">
                <h2>お薬いつまである？ 🤔</h2>
                <p>現在のお薬個数と1日の回数から、いつの分まであるかを瞬時に計算します。</p>
            </div>

            <!-- Toggle Form Trigger Button -->
            <div class="action-bar">
                <button id="toggle-form-btn" class="btn btn-primary">
                    <i data-lucide="plus-circle"></i>
                    <span>お薬を追加する</span>
                </button>
            </div>

            <!-- Input Form Section (Collapsible) -->
            <section id="form-section" class="form-section">
                <form id="medicine-form" class="form-container">
                    <h3 id="form-title">新しいお薬の入力</h3>
                    <input type="hidden" id="med-id">
                    
                    <div class="form-group">
                        <label for="med-name">お薬の名前 <span class="required">*</span></label>
                        <input type="text" id="med-name" required placeholder="例: ステロイド">
                    </div>

                    <div class="form-group">
                        <label for="med-base-date">基準日（在庫を確認した日） <span class="required">*</span></label>
                        <input type="date" id="med-base-date" required>
                    </div>

                    <div class="form-group">
                        <label for="med-stock">基準日の現在個数（個 / 錠 / ml） <span class="required">*</span></label>
                        <input type="number" id="med-stock" required min="0" step="any" placeholder="例: 30">
                    </div>

                    <div class="form-group">
                        <label for="med-daily-amount">1日あたりの使用個数 <span class="required">*</span></label>
                        <input type="number" id="med-daily-amount" required min="0.001" step="any" placeholder="例: 2 (1日2錠なら 2、2日に1錠なら 0.5)">
                    </div>

                    <div class="form-actions">
                        <button type="button" id="cancel-form-btn" class="btn btn-secondary">閉じる</button>
                        <button type="submit" class="btn btn-primary">計算・保存</button>
                    </div>
                </form>
            </section>

            <!-- Medicines List (Excel-like Table) -->
            <section class="list-section">
                <div class="section-title">
                    <h2>お薬の期限一覧</h2>
                </div>
                <div class="table-container">
                    <table class="medicine-table">
                        <thead>
                            <tr>
                                <th class="text-center" style="width: 60px;">順序</th>
                                <th>お薬名</th>
                                <th>基準日</th>
                                <th class="text-right">現在個数</th>
                                <th class="text-right">1日の個数</th>
                                <th>いつまである？</th>
                                <th class="text-center">在庫調整</th>
                                <th class="text-center">操作</th>
                            </tr>
                        </thead>
                        <tbody id="medicine-list-body">
                            <!-- Dynamic Content -->
                        </tbody>
                    </table>
                    <div id="empty-state" class="empty-state">
                        <i data-lucide="pill"></i>
                        <p>登録されているお薬はありません。<br>「お薬を追加する」ボタンから登録してください。</p>
                    </div>
                </div>
            </section>

            <!-- Settings / Backup Section (Minimal Accordion) -->
            <details class="settings-accordion">
                <summary class="settings-summary">
                    <i data-lucide="settings"></i> データのバックアップと管理
                </summary>
                <div class="settings-content">
                    <div class="setting-item">
                        <button id="export-btn" class="btn btn-secondary btn-sm"><i data-lucide="download"></i> エクスポート</button>
                        <label for="import-file" class="btn btn-secondary btn-sm file-input-label">
                            <i data-lucide="upload"></i> インポート
                            <input type="file" id="import-file" accept=".json" style="display: none;">
                        </label>
                    </div>
                    <div class="setting-item">
                        <button id="clear-all-btn" class="btn btn-danger btn-sm"><i data-lucide="trash-2"></i> 全データを消去</button>
                    </div>
                </div>
            </details>
        </main>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">メッセージ</div>

    <script src="app.js"></script>
</body>
</html>
